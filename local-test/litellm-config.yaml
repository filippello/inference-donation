# Gateway config used ONLY for the local end-to-end test.
# Same shape as gateway/litellm-config.yaml, but the single donor is the mock
# container instead of a real tunnel — so no OAuth/login needed to test routing.

model_list:
  - model_name: relief-claude
    litellm_params:
      model: openai/claude-sonnet-4-5
      api_base: http://mock-donor:8080/v1
      api_key: sk-mock
      rpm: 6
      max_parallel_requests: 1
    model_info:
      donor_id: mock
      provider: subscription

router_settings:
  routing_strategy: least-busy
  num_retries: 3
  allowed_fails: 2
  cooldown_time: 120
  timeout: 600

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL

litellm_settings:
  drop_params: true
