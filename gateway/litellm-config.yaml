# Central gateway config.
#
# Each donor is one entry in model_list. Multiple entries with the SAME
# model_name ("relief-claude" / "relief-codex") are load-balanced automatically
# by LiteLLM's router. Donors are normally added at RUNTIME with
# scripts/add-donor.sh (not edited here), but one example is shown so you can
# see the shape.

# Start empty — donors are added at runtime with scripts/add-donor.sh.
# Shape of one donor entry, for reference:
#   - model_name: relief-claude          # what recipients ask for
#     litellm_params:
#       model: openai/claude-sonnet-4-5  # model id CLIProxyAPI exposes
#       api_base: https://<donor>.trycloudflare.com/v1
#       api_key: sk-donor-...            # donor's CLIProxyAPI client key
#       rpm: 6                           # cap req/min to THIS donor...
#       max_parallel_requests: 1         # ...never more than 1 in flight
#     model_info: { donor_id: maria, provider: subscription }
model_list: []

# Router: assume donors are flaky (laptop closed, hit their 5h limit, etc.)
# and route around dead ones fast.
router_settings:
  routing_strategy: least-busy          # spread load, prefer idle donors
  num_retries: 3                        # retry a failed request on a DIFFERENT donor
  allowed_fails: 2                      # 2 fails ->
  cooldown_time: 120                    # ...bench that donor for 120s
  timeout: 600                          # coding responses can be long

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  # Recipients can only ever reach the relief-* models, never the admin surface.
  # Per-recipient quotas are set when you mint their key (scripts/issue-key.sh).

litellm_settings:
  drop_params: true                     # tolerate client params a donor doesn't support
  set_verbose: false
